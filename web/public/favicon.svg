<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Упрощение: только силуэт передних граней с depth edges -->
  <rect width="32" height="32" fill="#ffffff" />
  <!-- Правое здание (выше, уже) -->
  <polygon points="18,5 25,5 27,3 20,3" fill="#00736c" />
  <polygon points="25,5 25,26 27,24 27,3" fill="#00736c" />
  <rect x="18" y="5" width="7" height="21" fill="#ffffff" stroke="#00736c" stroke-width="1.3" stroke-linejoin="round" />
  <!-- Левое здание -->
  <polygon points="5,10 15,10 17,8 7,8" fill="#00736c" />
  <polygon points="15,10 15,26 17,24 17,8" fill="#00736c" />
  <rect x="5" y="10" width="10" height="16" fill="#ffffff" stroke="#00736c" stroke-width="1.3" stroke-linejoin="round" />
  <!-- Земля -->
  <line x1="3" y1="26" x2="29" y2="26" stroke="#00736c" stroke-width="1.3" stroke-linecap="round" />
</svg>
