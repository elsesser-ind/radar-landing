<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Radar bot avatar">
  <!-- Tele-аватар: только знак без подписи, здания крупнее и центрированы -->

  <!-- White full-bleed bg — Telegram обрежет в круг -->
  <rect width="512" height="512" fill="#ffffff" />

  <!-- Правое здание (выше, уже) -->
  <polygon points="292,78 400,78 440,53 332,53" fill="#00736c" />
  <polygon points="400,78 400,400 440,375 440,53" fill="#00736c" />
  <rect x="292" y="78" width="108" height="322" fill="#ffffff" stroke="#00736c" stroke-width="9" stroke-linejoin="round" />

  <!-- Левое здание (ниже, шире) -->
  <polygon points="90,150 240,150 280,125 130,125" fill="#00736c" />
  <polygon points="240,150 240,400 280,375 280,125" fill="#00736c" />
  <rect x="90" y="150" width="150" height="250" fill="#ffffff" stroke="#00736c" stroke-width="9" stroke-linejoin="round" />

  <!-- Depth edge lines -->
  <g stroke="#00736c" stroke-width="6" stroke-linecap="round">
    <line x1="90" y1="150" x2="130" y2="125" />
    <line x1="292" y1="78" x2="332" y2="53" />
  </g>

  <!-- Окна-точки, левое здание: 5 cols × 7 rows -->
  <g fill="#00736c">
    <circle cx="112" cy="178" r="7" /><circle cx="140" cy="178" r="7" /><circle cx="168" cy="178" r="7" /><circle cx="196" cy="178" r="7" /><circle cx="224" cy="178" r="7" />
    <circle cx="112" cy="208" r="7" /><circle cx="140" cy="208" r="7" /><circle cx="168" cy="208" r="7" /><circle cx="196" cy="208" r="7" /><circle cx="224" cy="208" r="7" />
    <circle cx="112" cy="238" r="7" /><circle cx="140" cy="238" r="7" /><circle cx="168" cy="238" r="7" /><circle cx="196" cy="238" r="7" /><circle cx="224" cy="238" r="7" />
    <circle cx="112" cy="268" r="7" /><circle cx="140" cy="268" r="7" /><circle cx="168" cy="268" r="7" /><circle cx="196" cy="268" r="7" /><circle cx="224" cy="268" r="7" />
    <circle cx="112" cy="298" r="7" /><circle cx="140" cy="298" r="7" /><circle cx="168" cy="298" r="7" /><circle cx="196" cy="298" r="7" /><circle cx="224" cy="298" r="7" />
    <circle cx="112" cy="328" r="7" /><circle cx="140" cy="328" r="7" /><circle cx="168" cy="328" r="7" /><circle cx="196" cy="328" r="7" /><circle cx="224" cy="328" r="7" />
    <circle cx="112" cy="358" r="7" /><circle cx="140" cy="358" r="7" /><circle cx="168" cy="358" r="7" /><circle cx="196" cy="358" r="7" /><circle cx="224" cy="358" r="7" />
  </g>

  <!-- Окна-точки, правое здание: 3 cols × 9 rows -->
  <g fill="#00736c">
    <circle cx="314" cy="108" r="7" /><circle cx="346" cy="108" r="7" /><circle cx="378" cy="108" r="7" />
    <circle cx="314" cy="140" r="7" /><circle cx="346" cy="140" r="7" /><circle cx="378" cy="140" r="7" />
    <circle cx="314" cy="172" r="7" /><circle cx="346" cy="172" r="7" /><circle cx="378" cy="172" r="7" />
    <circle cx="314" cy="204" r="7" /><circle cx="346" cy="204" r="7" /><circle cx="378" cy="204" r="7" />
    <circle cx="314" cy="236" r="7" /><circle cx="346" cy="236" r="7" /><circle cx="378" cy="236" r="7" />
    <circle cx="314" cy="268" r="7" /><circle cx="346" cy="268" r="7" /><circle cx="378" cy="268" r="7" />
    <circle cx="314" cy="300" r="7" /><circle cx="346" cy="300" r="7" /><circle cx="378" cy="300" r="7" />
    <circle cx="314" cy="332" r="7" /><circle cx="346" cy="332" r="7" /><circle cx="378" cy="332" r="7" />
    <circle cx="314" cy="364" r="7" /><circle cx="346" cy="364" r="7" /><circle cx="378" cy="364" r="7" />
  </g>

  <!-- Земля -->
  <line x1="60" y1="400" x2="460" y2="400" stroke="#00736c" stroke-width="9" stroke-linecap="round" />
</svg>
